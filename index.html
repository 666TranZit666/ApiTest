<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cazed Cloud Executor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #0f0f12; color: #e2e8f0; font-family: 'Segoe UI', system-ui, sans-serif; }
        .editor-card { background-color: #181820; border: 1px solid #2d2d3d; border-radius: 12px; box-shadow: 0 8px 24px rgba(0,0,0,0.5); }
        .code-box { background-color: #0b0b0f; border: 1px solid #3f3f56; color: #a7f3d0; font-family: 'Fira Code', 'Courier New', monospace; font-size: 14px; resize: none; }
        .code-box:focus { background-color: #0b0b0f; border-color: #3b82f6; color: #a7f3d0; box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2); outline: none; }
        .key-badge { background-color: #1e293b; border: 1px solid #3b82f6; color: #60a5fa; font-weight: bold; font-family: monospace; }
    </style>
</head>
<body>
    <script>
        // ========================================================
        // CONFIGURATION: PASTE YOUR STANDALONE WORKER URL HERE
        // ========================================================
        const WORKER_URL = "https://robloxapi.666tranzit666.workers.dev"; 

        // Generate a persistent session key on page load
        const sessionKey = "RBX-" + Math.floor(100000 + Math.random() * 900000);

        async function executeScript() {
            const codeInput = document.getElementById("luaCode").value;
            const statusDiv = document.getElementById("statusMessage");

            if (!codeInput.trim()) {
                showStatus("Please enter some Luau code first!", "danger");
                return;
            }

            showStatus("Sending package to Cloudflare Edge...", "warning");

            try {
                // Notice the clear path pointing directly to /send-code
                const response = await fetch(`${WORKER_URL}/send-code`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ key: sessionKey, code: codeInput })
                });

                if (response.ok) {
                    showStatus("Success! Packet queued for Roblox execution.", "success");
                } else {
                    const errText = await response.text();
                    showStatus(`Server Rejected Package: ${errText}`, "danger");
                }
            } catch (error) {
                showStatus(`Network Error: Unabe to connect to backend worker.`, "danger");
            }
        }

        function showStatus(text, type) {
            const statusDiv = document.getElementById("statusMessage");
            statusDiv.className = `alert alert-${type} mt-3 py-2 text-center`;
            statusDiv.innerText = text;
        }

        function copyKey() {
            navigator.clipboard.writeText(sessionKey);
            alert("Session key copied to clipboard! Paste this into line 7 of your Roblox script.");
        }

        window.onload = () => {
            document.getElementById("displayKey").innerText = sessionKey;
        };
    </script>

    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="text-center mb-4">
                    <h1 class="fw-bold text-white">Cazed Execution Hub</h1>
                    <p class="text-muted">Send script binaries to your Roblox game client via Cloudflare Edge</p>
                </div>

                <div class="editor-card p-4">
                    <div class="d-flex justify-content-between align-items-center mb-3 flex-wrap gap-2">
                        <div class="d-flex align-items-center gap-2">
                            <span class="text-secondary small">Your Game Key:</span>
                            <span id="displayKey" class="badge key-badge px-3 py-2 fs-6">RBX-000000</span>
                            <button class="btn btn-sm btn-outline-secondary py-1" onclick="copyKey()">Copy</button>
                        </div>
                        <span class="badge bg-success py-2 px-3">Pipeline Stable</span>
                    </div>

                    <textarea id="luaCode" class="form-control code-box p-3" rows="14" placeholder='-- Write your Roblox code here...&#10;print("Hello from www.cazed.wtf!")&#10;workspace.BasePlate.Color = Color3.fromRGB(0, 255, 120)'></textarea>

                    <div id="statusMessage" class="alert alert-info mt-3 py-2 text-center d-none">Ready</div>

                    <div class="mt-4 d-grid">
                        <button class="btn btn-primary btn-lg fw-semibold" onclick="executeScript()">Execute Script Live</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
