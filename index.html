<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luma Control Panel</title>
    <style>
        :root {
            --bg-main: #121212; --bg-sidebar: #181818; --bg-card: #1f1f1f;
            --text-primary: #ffffff; --text-secondary: #aaaaaa;
            --accent-primary: #ff0000; --border-line: #2d2d2d; --tab-hover: #2a2a2a;
        }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background-color: var(--bg-main); color: var(--text-secondary); display: flex; height: 100vh; overflow: hidden; }
        .sidebar { width: 250px; background-color: var(--bg-sidebar); border-right: 1px solid var(--border-line); padding: 25px 15px; display: flex; flex-direction: column; gap: 6px; }
        .tab-button { background: none; border: none; padding: 12px; color: var(--text-secondary); cursor: pointer; text-align: left; border-radius: 8px; }
        .tab-button.active { background-color: var(--bg-card); color: var(--text-primary); }
        .main-window { flex: 1; padding: 40px; overflow-y: auto; }
        .tab-panel { display: none; }
        .tab-panel.active { display: block; }
        .control-card { background-color: var(--bg-card); border: 1px solid var(--border-line); border-radius: 12px; padding: 18px; margin-bottom: 15px; max-width: 600px; }
        .card-title { font-weight: bold; color: var(--text-primary); margin: 0 0 5px 0; }
        .card-desc { font-size: 0.85rem; margin: 0 0 10px 0; }
        .custom-input { background-color: var(--bg-main); border: 1px solid var(--border-line); color: var(--text-primary); padding: 8px; border-radius: 6px; width: 100%; }
        .action-btn { background-color: var(--accent-primary); color: white; border: none; padding: 10px 18px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .theme-card { background-color: var(--bg-card); border: 1px solid var(--border-line); padding: 10px; cursor: pointer; margin: 5px; display: inline-block; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div style="font-weight:bold; font-size:1.5rem; color:#fff; margin-bottom:20px;">Luma</div>
        <button class="tab-button active" onclick="switchTab(event, 'home-panel')">Home</button>
        <button class="tab-button" onclick="switchTab(event, 'player-panel')">Player</button>
        <button class="tab-button" onclick="switchTab(event, 'settings-panel')">Settings</button>
    </div>

    <div class="main-window">
        <!-- Home -->
        <div id="home-panel" class="tab-panel active">
            <h1>Luma Dashboard</h1>
            <div class="control-card">
                <p class="card-title">Connection Status</p>
                <div id="playerConnectionStatus">Waiting for client...</div>
            </div>
        </div>

        <!-- Player -->
        <div id="player-panel" class="tab-panel">
            <h1>Player Settings</h1>
            <div class="control-card">
                <p class="card-title">Spectate Player</p>
                <select class="custom-input" id="spectateDropdown" onchange="targetPlayerName = this.value">
                    <option value="">Select a player...</option>
                </select>
                <div style="margin-top:10px;">
                    <button class="action-btn" onclick="startSpectating()">Start Spectating</button>
                    <button class="action-btn" onclick="stopSpectating()">Stop</button>
                </div>
            </div>
        </div>

        <!-- Settings -->
        <div id="settings-panel" class="tab-panel">
            <h1>Theme Management</h1>
            <div id="theme-grid">
                <div class="theme-card" onclick="applyThemeProfile('Rise')">Rise</div>
                <div class="theme-card" onclick="applyThemeProfile('OLED')">OLED</div>
            </div>
        </div>
    </div>

    <script>
        const WORKER_URL = "https://robloxapi.6dds26hhmm.workers.dev";
        const sessionKey = "LUMA-3B318FED251169E1A2DEA27E";
        let targetPlayerName = "";

        function switchTab(event, panelId) {
            document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.tab-button').forEach(b => b.classList.remove('active'));
            document.getElementById(panelId).classList.add('active');
            event.currentTarget.classList.add('active');
        }

        // Theme Cookie Logic
        function saveThemeToCookie(themeName) {
            document.cookie = `LumaTheme=${themeName};path=/;max-age=31536000`;
        }

        function loadThemeFromCookie() {
            const match = document.cookie.match(new RegExp('(^| )LumaTheme=([^;]+)'));
            if (match) applyThemeProfile(match[2]);
        }

        function applyThemeProfile(themeName) {
            const themes = {
                'Rise': { main: '#121212', accent: '#ff0000' },
                'OLED': { main: '#000000', accent: '#ffffff' }
            };
            const theme = themes[themeName];
            document.documentElement.style.setProperty('--bg-main', theme.main);
            document.documentElement.style.setProperty('--accent-primary', theme.accent);
            saveThemeToCookie(themeName);
        }

        // Spectator Logic
        async function sendCodeToRoblox(codeString) {
            await fetch(`${WORKER_URL}/send-code?key=${sessionKey}`, {
                method: "POST",
                body: JSON.stringify({ key: sessionKey, code: codeString })
            });
        }

        function startSpectating() {
            if (!targetPlayerName) return;
            const code = `
                local target = game:GetService("Players"):FindFirstChild("${targetPlayerName}")
                if target and target.Character and target.Character:FindFirstChild("Head") then
                    workspace.CurrentCamera.CameraSubject = target.Character.Head
                end
            `;
            sendCodeToRoblox(code);
        }

        function stopSpectating() {
            const code = `
                local lp = game:GetService("Players").LocalPlayer
                if lp and lp.Character and lp.Character:FindFirstChild("Humanoid") then
                    workspace.CurrentCamera.CameraSubject = lp.Character.Humanoid
                end
            `;
            sendCodeToRoblox(code);
        }

        window.addEventListener("DOMContentLoaded", () => {
            loadThemeFromCookie();
        });
    </script>
</body>
</html>
